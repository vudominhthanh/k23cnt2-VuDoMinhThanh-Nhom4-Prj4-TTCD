<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quản Lý Người Dùng</title>

    <link rel="stylesheet"
          th:href="@{/css/admin-dashboard.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<th:block th:with="activeMenu='users'">

    <div class="dashboard-container">

        <!-- SIDEBAR -->
        <div th:replace="~{Admin/layout/sidebar :: sidebar}"></div>

        <!-- MAIN -->
        <div class="main-wrapper">

            <!-- NAVBAR -->
            <div th:replace="~{Admin/layout/navbar :: navbar}"></div>

            <!-- CONTENT -->
            <main class="main-content">

                <!-- TOP ACTION -->
                <div class="top-actions">

                    <button class="add-btn"
                            onclick="openAddModal()">

                        <i class="fa-solid fa-plus"></i>
                        Thêm người dùng

                    </button>

                </div>

                <!-- TABLE -->
                <div class="table-container">

                    <h3>Danh sách người dùng</h3>

                    <table class="data-table">

                        <thead>

                        <tr>

                            <th>ID</th>
                            <th>Họ tên</th>
                            <th>Email</th>
                            <th>SĐT</th>
                            <th>Role</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="user : ${users}">

                            <td th:text="${user.id}"></td>

                            <td th:text="${user.fullName}"></td>

                            <td th:text="${user.email}"></td>

                            <td th:text="${user.phone}"></td>

                            <td th:text="${user.role}"></td>

                            <td>

                                <span class="badge"
                                      th:classappend="${user.isActive ? 'badge-success' : 'badge-warning'}"
                                      th:text="${user.isActive ? 'Hoạt động' : 'Khóa'}">

                                </span>

                            </td>

                            <td>

                                <!-- EDIT -->
                                <button class="action-btn"

                                        th:attr="
                                            data-id=${user.id},
                                            data-fullname=${user.fullName},
                                            data-email=${user.email},
                                            data-phone=${user.phone},
                                            data-role=${user.role},
                                            data-active=${user.isActive}"

                                        onclick="openEditModal(this)">

                                    <i class="fa-solid fa-pen"></i>

                                </button>

                                <!-- DELETE -->
                                <button class="delete-btn"
                                        th:onclick="'deleteUser(' + ${user.id} + ')'">

                                    <i class="fa-solid fa-trash"></i>

                                </button>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </main>

        </div>

    </div>

</th:block>

<!-- MODAL -->
<div class="modal"
     id="userModal">

    <div class="modal-content">

        <!-- HEADER -->
        <div class="modal-header">

            <h2 id="modalTitle">
                Thêm người dùng
            </h2>

            <span class="close-btn"
                  onclick="closeModal()">

                &times;

            </span>

        </div>

        <!-- BODY -->
        <div class="modal-body">

            <input type="hidden"
                   id="userId">

            <!-- FULL NAME -->
            <div class="form-group">

                <label>Họ tên</label>

                <input type="text"
                       id="fullName"
                       placeholder="Nguyễn Văn A">

            </div>

            <!-- EMAIL -->
            <div class="form-group">

                <label>Email</label>

                <input type="email"
                       id="email"
                       placeholder="admin@gmail.com">

            </div>

            <!-- PHONE -->
            <div class="form-group">

                <label>Số điện thoại</label>

                <input type="text"
                       id="phone"
                       placeholder="0123456789">

            </div>

            <!-- PASSWORD -->
            <div class="form-group">

                <label>Mật khẩu</label>

                <input type="password"
                       id="password"
                       placeholder="******">

            </div>

            <!-- ROLE -->
            <div class="form-group">

                <label>Vai trò</label>

                <select id="role">

                    <option value="ADMIN">
                        ADMIN
                    </option>

                    <option value="CUSTOMER">
                        CUSTOMER
                    </option>

                </select>

            </div>

            <!-- ACTIVE -->
            <div class="form-group">

                <label>Trạng thái</label>

                <select id="isActive">

                    <option value="true">
                        Hoạt động
                    </option>

                    <option value="false">
                        Khóa
                    </option>

                </select>

            </div>

            <!-- SAVE -->
            <button class="save-btn"
                    onclick="saveUser()">

                <i class="fa-solid fa-floppy-disk"></i>
                Lưu người dùng

            </button>

        </div>

    </div>

</div>

<script th:src="@{/js/admin-users.js}"></script>

</body>
</html>
