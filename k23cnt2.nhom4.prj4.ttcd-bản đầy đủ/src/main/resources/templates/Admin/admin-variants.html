<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quản lý kích cỡ</title>

    <link rel="stylesheet"
          th:href="@{/css/admin-dashboard.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<th:block th:with="activeMenu='variant'">

    <div class="dashboard-container">

        <!-- SIDEBAR -->
        <div th:replace="~{Admin/layout/sidebar :: sidebar}"></div>

        <!-- MAIN -->
        <div class="main-wrapper">

            <!-- NAVBAR -->
            <div th:replace="~{Admin/layout/navbar :: navbar}"></div>

            <!-- CONTENT -->
            <main class="main-content">

                <div class="content-header">

                    <h1>Quản lý kích cỡ</h1>

                </div>

                <div class="top-actions">

                    <button class="add-btn"
                            onclick="openAddModal()">

                        <i class="fa-solid fa-plus"></i>
                        Thêm kích cỡ

                    </button>

                </div>

                <div class="table-container">

                    <h3>Danh sách kích cỡ</h3>

                    <table class="data-table">

                        <thead>

                        <tr>

                            <th>ID</th>

                            <th>Sản phẩm</th>

                            <th>Size</th>

                            <th>Phụ thu</th>

                            <th>Hành động</th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="variant : ${variants}">

                            <td th:text="${variant.id}"></td>

                            <td th:text="${variant.product.name}"></td>

                            <td th:text="${variant.sizeName}"></td>

                            <td th:text="${variant.extraPrice}"></td>

                            <td>

                                <button class="edit-btn"

                                        th:attr="
        data-id=${variant.id},
        data-product=${variant.product.id},
        data-size=${variant.sizeName},
        data-price=${variant.extraPrice}"

                                        onclick="openEditModal(this)">

                                    <i class="fa-solid fa-pen"></i>

                                </button>

                                <button class="delete-btn"

                                        th:onclick="'deleteVariant(' + ${variant.id} + ')'">

                                    <i class="fa-solid fa-trash"></i>

                                </button>
                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </main>

        </div>

    </div>

</th:block>
<div class="modal" id="variantModal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">
                Thêm kích cỡ
            </h2>

            <span class="close-btn"
                  onclick="closeModal()">

                &times;

            </span>

        </div>

        <div class="modal-body">

            <input type="hidden"
                   id="variantId">

            <div class="form-group">

                <label>Sản phẩm</label>

                <select id="productId">

                    <option th:each="product : ${products}"
                            th:value="${product.id}"
                            th:text="${product.name}">
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Size</label>

                <input type="text"
                       id="sizeName">

            </div>

            <div class="form-group">

                <label>Phụ thu</label>

                <input type="number"
                       id="extraPrice">

            </div>

            <button class="save-btn"
                    onclick="saveVariant()">

                <i class="fa-solid fa-floppy-disk"></i>

                Lưu

            </button>

        </div>

    </div>

</div>
<script th:src="@{/js/admin-variant.js}"></script>
</body>

</html>
