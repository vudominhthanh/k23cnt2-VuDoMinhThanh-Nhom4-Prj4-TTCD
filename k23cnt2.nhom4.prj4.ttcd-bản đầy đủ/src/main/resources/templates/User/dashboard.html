<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{User/_layout}">
<head>
    <title>User - Tea & Coffee</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div layout:fragment="content">
    <div class="dashboard-layout">
        <aside class="db-sidebar bg-dashboard-card py-4">
            <div class="text-center mb-4 px-3">
                <img src="https://ui-avatars.com/api/?name=User&background=689f38&color=fff" class="rounded-circle border border-2 border-white shadow-sm" style="width: 65px; height: 65px;">
                <h6 class="fw-bold mt-3 mb-0 text-dark" id="db-user-title">Đang kiểm tra...</h6>
                <span class="badge bg-light text-muted border mt-1" style="font-size: 0.75rem;">Thành viên</span>
            </div>
            <nav class="db-menu">
                <a th:href="@{/customer/dashboard}" class="sidebar-link cus-link active"><i class="fa-solid fa-house-user"></i>Tổng quan</a>
                <a th:href="@{/customer/cart}" class="sidebar-link cus-link"><i class="fa-solid fa-basket-shopping"></i>Giỏ hàng</a>
                <a th:href="@{/customer/orders}" class="sidebar-link cus-link"><i class="fa-solid fa-clock-rotate-left"></i>Đơn hàng</a>
                <a th:href="@{/customer/settings}" class="sidebar-link cus-link"><i class="fa-solid fa-user-gear"></i>Cài đặt</a>
                <a href="javascript:void(0)" class="sidebar-link opacity-50" style="cursor:not-allowed;"><i class="fa-solid fa-map-location-dot"></i>Địa chỉ <span class="badge-dev">Đang phát triển</span></a>
                <a href="javascript:void(0)" class="sidebar-link opacity-50" style="cursor:not-allowed;"><i class="fa-solid fa-ticket"></i>Voucher <span class="badge-dev">Đang phát triển</span></a>
            </nav>
        </aside>

        <main class="db-stage">
            <div class="animate-fade-up">
                <h4 class="fw-bold mb-4" style="color: var(--coffee-dark);">Bảng điều khiển tổng quan</h4>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="widget-stat h-100 p-3 d-flex align-items-center bg-white rounded-4 shadow-sm border border-light">
                            <div class="rounded-circle bg-light text-success text-center me-3 flex-shrink-0" style="width:50px; height:50px; line-height:50px; font-size: 1.2rem;">
                                <i class="fa-solid fa-star"></i>
                            </div>
                            <div>
                                <small class="text-muted d-block small">Điểm tích lũy</small>
                                <span class="fw-bold fs-5" id="val-points">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="widget-stat h-100 p-3 d-flex align-items-center bg-white rounded-4 shadow-sm border border-light">
                            <div class="rounded-circle bg-light text-danger text-center me-3 flex-shrink-0" style="width:50px; height:50px; line-height:50px; font-size: 1.2rem;">
                                <i class="fa-solid fa-cart-shopping"></i>
                            </div>
                            <div>
                                <small class="text-muted d-block small">Giỏ hàng</small>
                                <span class="fw-bold fs-5" id="val-cart">0 món</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="widget-stat h-100 p-3 d-flex align-items-center bg-white rounded-4 shadow-sm border border-light">
                            <div class="rounded-circle bg-light text-warning text-center me-3 flex-shrink-0" style="width:50px; height:50px; line-height:50px; font-size: 1.2rem;">
                                <i class="fa-solid fa-truck"></i>
                            </div>
                            <div>
                                <small class="text-muted d-block small">Đơn xử lý</small>
                                <span class="fw-bold fs-5" id="val-orders">0 đơn</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-dashboard-card p-4 rounded-4 shadow-sm border border-light bg-white">
                    <h6 class="fw-bold mb-3"><i class="fa-solid fa-bolt me-2 text-warning"></i>Hoạt động gần đây</h6>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" style="font-size: 0.9rem;" id="recent-orders-table">
                            <thead class="table-light">
                            <tr><th>Mã Đơn</th><th>Thời Gian</th><th>Tổng Tiền</th><th>Trạng Thái</th></tr>
                            </thead>
                            <tbody>
                            <tr><td colspan="4" class="text-center text-muted py-4">Đang quét dữ liệu...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script th:src="@{/js/apiClient.js}"></script>
    <script>
        async function loadOverview() {
            const user = await window.checkAuthAndGetProfile();
            if (!user) return;
            document.getElementById('db-user-title').innerText = user.fullName || user.username;

            const res = await window.fetchWithToken('/api/customer/overview');
            if (res && res.ok) {
                const data = await res.json();
                document.getElementById('val-points').innerText = data.loyaltyPoints + " Bean";
                document.getElementById('val-cart').innerText = data.cartCount + " món";
                document.getElementById('val-orders').innerText = data.pendingOrdersCount + " đơn";

                const tbody = document.querySelector('#recent-orders-table tbody');
                if(data.recentOrders.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">Không có hoạt động nào gần đây</td></tr>`;
                } else {
                    tbody.innerHTML = data.recentOrders.map(o => `
                        <tr>
                            <td class="fw-bold text-dark">${o.orderId}</td>
                            <td>${new Date(o.orderDate).toLocaleString('vi-VN')}</td>
                            <td class="text-danger fw-bold">${o.totalAmount.toLocaleString('vi-VN')} đ</td>
                            <td><span class="badge bg-warning text-dark rounded-pill">${o.status}</span></td>
                        </tr>
                    `).join('');
                }
            }
        }
        loadOverview();
    </script>
</div>
</body>
</html>
