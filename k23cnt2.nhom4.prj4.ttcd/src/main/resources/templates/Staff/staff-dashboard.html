<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Staff Dashboard - Tea & Coffee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/staff-dashboard.css}">
</head>
<body>

<div class="container-fluid h-100 p-0">
    <div class="row g-0 h-100">

        <aside class="col-md-4 col-lg-3 border-end bg-light d-flex flex-column h-100">
            <div class="p-3 border-bottom bg-white sticky-top">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold m-0"><i class="fas fa-clipboard-list me-2"></i>ĐƠN ĐANG XỬ LÝ</h6>
                    <span class="badge bg-danger rounded-pill" id="order-count">0</span>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" id="orderSearch" class="form-control border-start-0" placeholder="Tìm mã đơn hàng...">
                </div>
            </div>

            <div id="active-orders-grid" class="order-list-container p-2 flex-grow-1 overflow-auto">
                <div class="row g-2" id="order-grid-inner">
                </div>
            </div>
        </aside>

        <main class="col-md-8 col-lg-9 d-flex flex-column h-100 bg-white">
            <div class="row g-0 h-100">
                <section class="col-md-8 border-end d-flex flex-column h-100">
                    <div class="p-3 border-bottom d-flex align-items-center gap-3">
                        <div class="input-group flex-grow-1">
                            <span class="input-group-text"><i class="fas fa-mug-hot"></i></span>
                            <input type="text" id="productSearch" class="form-control" placeholder="Tìm món nhanh...">
                        </div>
                        <div class="dropdown">
                            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">Danh mục</button>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Cà phê</a></li>
                                <li><a class="dropdown-item" href="#">Trà tươi</a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="menu-container p-3 overflow-auto flex-grow-1 bg-light">
                        <div class="row row-cols-2 row-cols-lg-3 row-cols-xl-4 g-3" id="product-list">
                        </div>
                    </div>
                </section>

                <section class="col-md-4 d-flex flex-column h-100">
                    <div class="p-3 border-bottom bg-white">
                        <h6 class="fw-bold m-0 text-uppercase">Hóa đơn chờ</h6>
                    </div>
                    <div class="cart-items flex-grow-1 overflow-auto p-3" id="current-cart">
                    </div>
                    <div class="order-summary p-3 bg-dark text-white rounded-top-4 shadow-lg">
                        <div class="d-flex justify-content-between mb-1">
                            <small>Tạm tính</small> <span id="sub-total">0đ</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2 text-warning">
                            <small>Giảm giá</small> <span id="discount-amount">-0đ</span>
                        </div>
                        <div class="d-flex justify-content-between fw-bold fs-5 border-top pt-2">
                            <span>TỔNG</span> <span class="text-success" id="final-total">0đ</span>
                        </div>
                        <button class="btn btn-success btn-lg w-100 mt-3 fw-bold">XÁC NHẬN & IN BILL</button>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>

<div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-bold" id="modalOrderCode">Chi tiết đơn #----</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <div id="modalOrderItems" class="mb-4">
                </div>
                <div class="p-3 bg-light rounded-3 border">
                    <div class="d-flex justify-content-between mb-2">
                        <span>Trạng thái:</span> <span id="modalStatus" class="badge">---</span>
                    </div>
                    <div class="d-flex justify-content-between fw-bold">
                        <span>Tổng tiền:</span> <span class="text-primary" id="modalTotal">0đ</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer flex-column p-3 bg-light">
                <div class="d-flex w-100 gap-2 mb-2">
                    <button id="btnConfirm" class="btn btn-primary flex-grow-1 fw-bold">XÁC NHẬN ĐƠN</button>
                    <button id="btnComplete" class="btn btn-success flex-grow-1 fw-bold">HOÀN THÀNH</button>
                </div>
                <button id="btnCancel" class="btn btn-outline-danger w-100">HỦY ĐƠN HÀNG</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:src="@{/js/staff-dashboard.js}"></script>
</body>
</html>
