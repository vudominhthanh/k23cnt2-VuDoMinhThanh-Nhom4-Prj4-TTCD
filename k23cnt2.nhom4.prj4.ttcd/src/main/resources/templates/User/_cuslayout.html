<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/User/_layout}">
<head>
    <title>Dashboard Cá Nhân</title>
    <link rel="stylesheet" th:href="@{/css/_cuslayout.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div layout:fragment="content" class="w-100">
    <div class="app-container">
        <aside class="app-sidebar">
            <div class="brand-zone">
                <div class="logo-circle"><span class="avatar-letter">M</span></div>
                <span class="brand-name">Vũ Đỗ Minh Thành</span>
                <div class="user-stats">
                    <span class="stat-badge"><i class="fas fa-receipt"></i> 12 Đơn</span>
                    <span class="stat-badge"><i class="fas fa-star text-warning"></i> 450k</span>
                </div>
            </div>
            <nav class="app-nav">
                <a th:href="@{/customer/profile}" class="nav-item cus-link">
                    <i class="fas fa-user-circle"></i> <span>Hồ sơ cá nhân</span>
                </a>
                <a th:href="@{/customer/address}" class="nav-item cus-link">
                    <i class="fas fa-map-marked-alt"></i> <span>Sổ địa chỉ</span>
                </a>
                <a th:href="@{/customer/cart}" class="nav-item cus-link">
                    <i class="fas fa-shopping-bag"></i> <span>Giỏ hàng</span>
                </a>
                <a th:href="@{/customer/order}" class="nav-item cus-link">
                    <i class="fas fa-box-open"></i> <span>Lịch sử đơn</span>
                </a>
            </nav>
        </aside>

        <main class="app-main">
            <div id="function-div" class="content-card">
                <div layout:fragment="cus-content"></div>
            </div>
        </main>
    </div>
</div>

</body>
</html>
