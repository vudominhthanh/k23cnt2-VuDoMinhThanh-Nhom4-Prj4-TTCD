<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{User/_cuslayout}">
<head>
    <title>Sổ Địa Chỉ</title>
</head>
<body>

<th:block layout:fragment="cus-css">
    <link rel="stylesheet" th:href="@{/css/customer_address.css}">
</th:block>

<div layout:fragment="cus-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0" style="color: var(--coffee-dark)">Địa Chỉ Của Tôi</h4>
        <button class="btn btn-add-address" onclick="AddressApp.openModal('ADD')">
            <i class="fas fa-plus me-1"></i> Thêm Địa Chỉ Mới
        </button>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="address-card is-default p-4">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h6 class="fw-bold mb-0">Nhà Riêng</h6>
                    <span class="badge badge-default"><i class="fas fa-check-circle"></i> Mặc định</span>
                </div>
                <div class="address-details text-muted small mb-3">
                    <p class="mb-1"><i class="fas fa-user me-2"></i> Vũ Đỗ Minh Thành | 0123456789</p>
                    <p class="mb-0"><i class="fas fa-map-marker-alt me-2"></i> Số 123, Đường Nguyễn Trãi, Quận Hà Đông, Hà Nội</p>
                </div>
                <div class="action-buttons pt-3 border-top border-light">
                    <button class="btn btn-sm text-primary p-0 me-3" onclick="AddressApp.openModal('EDIT', 1)">Cập nhật</button>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="address-card p-4">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h6 class="fw-bold mb-0">Công Ty</h6>
                </div>
                <div class="address-details text-muted small mb-3">
                    <p class="mb-1"><i class="fas fa-user me-2"></i> Vũ Đỗ Minh Thành | 0987654321</p>
                    <p class="mb-0"><i class="fas fa-map-marker-alt me-2"></i> Tòa nhà X, Phố Y, Quận Hoàn Kiếm, Hà Nội</p>
                </div>
                <div class="action-buttons pt-3 border-top border-light">
                    <button class="btn btn-sm text-primary p-0 me-3" onclick="AddressApp.openModal('EDIT', 2)">Cập nhật</button>
                    <button class="btn btn-sm text-danger p-0 me-3" onclick="AddressApp.deleteAddress(2)">Xóa</button>
                    <button class="btn btn-sm text-success p-0">Thiết lập mặc định</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addressModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-modal">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="addressModalTitle" style="color: var(--coffee-dark);">Thêm Địa Chỉ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-4">
                    <form id="addressForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <input type="text" class="form-control custom-input" placeholder="Họ và tên người nhận">
                            </div>
                            <div class="col-md-6">
                                <input type="text" class="form-control custom-input" placeholder="Số điện thoại">
                            </div>
                            <div class="col-12">
                                <textarea class="form-control custom-input" rows="3" placeholder="Địa chỉ cụ thể (Số nhà, tên đường...)"></textarea>
                            </div>
                            <div class="col-12">
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" id="checkDefault">
                                    <label class="form-check-label small text-muted" for="checkDefault">Đặt làm địa chỉ mặc định</label>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn btn-save w-100 mt-4 py-2">Hoàn Tất</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="cus-scripts">
    <script th:src="@{/js/customer_address.js}"></script>
</th:block>

</body>
</html>
