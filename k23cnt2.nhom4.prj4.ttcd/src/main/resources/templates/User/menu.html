<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/User/_layout}">
<head>
    <title>Thực Đơn - Tea & Coffee</title>

    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
<div layout:fragment="content" class="menu-wrapper">

    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" style="color: var(--coffee-light); text-decoration: none;"><i class="fa-solid fa-house me-1"></i>Trang Chủ</a></li>
            <li class="breadcrumb-item active" aria-current="page" style="color: var(--coffee-dark); font-weight: bold;">Thực Đơn</li>
        </ol>
    </nav>

    <div class="row">
        <!-- CỘT TRÁI: ASIDE BỘ LỌC -->
        <aside class="col-lg-3 mb-4">
            <div class="filter-sidebar">
                <h4 class="filter-title"><i class="fa-solid fa-filter me-2"></i>Lọc Sản Phẩm</h4>

                <div class="mb-4">
                    <h6 class="fw-bold mb-3"><i class="fa-solid fa-layer-group me-2" style="color: var(--coffee-light);"></i>Danh Mục</h6>
                    <div class="form-check mb-2">
                        <input class="form-check-input category-filter" type="checkbox" data-id="1" id="catCoffee" checked>
                        <label class="form-check-label" for="catCoffee">Cà Phê</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input category-filter" type="checkbox" data-id="2" id="catTea">
                        <label class="form-check-label" for="catTea">Trà</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input category-filter" type="checkbox" data-id="3" id="catPastry">
                        <label class="form-check-label" for="catPastry">Bánh Ngọt</label>
                    </div>
                    <!-- Nút xóa bộ lọc danh mục -->
                    <button class="btn btn-sm btn-link text-muted mt-1 p-0" id="clearCategory" style="text-decoration: none; font-size: 0.85rem;"><i class="fa-solid fa-rotate-left me-1"></i>Bỏ chọn tất cả</button>
                </div>

                <!-- Lọc theo Size (Nhớ thêm value="S" và class size-filter) -->
                <div class="mb-4">
                    <h6 class="fw-bold mb-3"><i class="fa-solid fa-mug-hot me-2" style="color: var(--coffee-light);"></i>Kích Cỡ</h6>
                    <div class="d-flex gap-2">
                        <input type="checkbox" class="btn-check size-filter" value="S" id="sizeS" autocomplete="off">
                        <label class="btn btn-outline-secondary rounded-circle" for="sizeS" style="width: 40px; height: 40px; padding: 7px;">S</label>

                        <input type="checkbox" class="btn-check size-filter" value="M" id="sizeM" autocomplete="off" checked>
                        <label class="btn btn-outline-secondary rounded-circle" for="sizeM" style="width: 40px; height: 40px; padding: 7px;">M</label>

                        <input type="checkbox" class="btn-check size-filter" value="L" id="sizeL" autocomplete="off">
                        <label class="btn btn-outline-secondary rounded-circle" for="sizeL" style="width: 40px; height: 40px; padding: 7px;">L</label>
                    </div>
                </div>

                <div class="mb-4">
                    <h6 class="fw-bold mb-3"><i class="fa-solid fa-money-bill-wave me-2" style="color: var(--coffee-light);"></i>Khoảng Giá (VNĐ)</h6>
                    <div class="price-input-group mb-2">
                        <input type="number" class="form-control" placeholder="Từ" id="minPrice" min="0">
                        <span class="text-muted fw-bold">-</span>
                        <input type="number" class="form-control" placeholder="Đến" id="maxPrice" min="0">
                    </div>
                </div>

                <div class="mb-4">
                    <h6 class="fw-bold mb-3"><i class="fa-regular fa-star-half-stroke me-2" style="color: var(--coffee-light);"></i>Đánh Giá</h6>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="ratingFilter" id="star5">
                        <label class="form-check-label rating-stars" for="star5">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        </label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="ratingFilter" id="star4">
                        <label class="form-check-label rating-stars" for="star4">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-regular fa-star"></i> +
                        </label>
                    </div>
                </div>
            </div>
        </aside>

        <!-- CỘT PHẢI: HIỂN THỊ SẢN PHẨM -->
        <div class="col-lg-9">

            <!-- Thanh Tìm kiếm & Sắp xếp -->
            <div class="row mb-4 align-items-center">
                <div class="col-md-7 mb-3 mb-md-0">
                    <div class="input-group search-bar">
                        <input type="text" class="form-control" id="searchInput" placeholder="Tìm kiếm đồ uống yêu thích của bạn...">
                        <button class="btn" type="button"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </div>
                <div class="col-md-5 d-flex justify-content-md-end align-items-center">
                    <span class="me-2 text-muted text-nowrap"><i class="fa-solid fa-arrow-down-a-z me-1"></i>Sắp xếp:</span>
                    <select class="form-select sort-select w-auto shadow-sm">
                        <option selected>Mới nhất</option>
                        <option value="1">Bán chạy nhất</option>
                        <option value="2">Giá: Thấp đến Cao</option>
                        <option value="3">Giá: Cao xuống Thấp</option>
                    </select>
                </div>
            </div>

            <!-- Grid Sản phẩm (Đã THÊM id="product-grid" để JS dễ tìm) -->
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-5" id="product-grid">
                <!-- Nội dung ở đây sẽ bị JS ghi đè ngay khi load trang -->
            </div>

            <!-- Phân trang -->
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center">
                    <li class="page-item disabled">
                        <a class="page-link" href="#" tabindex="-1" aria-disabled="true"><i class="fa-solid fa-chevron-left"></i></a>
                    </li>
                    <li class="page-item active" aria-current="page"><a class="page-link" href="#" style="background-color: var(--tea-green); border-color: var(--tea-green);">1</a></li>
                    <li class="page-item"><a class="page-link" href="#" style="color: var(--coffee-dark);">2</a></li>
                    <li class="page-item"><a class="page-link" href="#" style="color: var(--coffee-dark);">3</a></li>
                    <li class="page-item">
                        <a class="page-link" href="#" style="color: var(--coffee-dark);"><i class="fa-solid fa-chevron-right"></i></a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script th:src="@{/js/menu.js}"></script>

    <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header" style="background-color: var(--coffee-dark, #4e342e); color: white;">
                    <h5 class="modal-title" id="productModalLabel"><i class="fa-solid fa-mug-hot me-2"></i>Tùy chọn món ăn</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex align-items-center mb-3 pb-3 border-bottom">
                        <img id="popupProductImg" src="" alt="" class="rounded" style="width: 70px; height: 70px; object-fit: cover;">
                        <div class="ms-3">
                            <h5 class="fw-bold mb-1" id="popupProductName">Tên sản phẩm</h5>
                            <p class="text-danger fw-bold mb-0" id="popupProductPrice">0 đ</p>
                        </div>
                    </div>

                    <div class="mb-4">
                        <h6 class="fw-bold mb-2"><i class="fa-solid fa-arrows-maximize me-2 text-muted"></i>Chọn Kích Cỡ (Size):</h6>
                        <div class="d-flex gap-2" id="popupSizeContainer">
                        </div>
                    </div>

                    <div class="mb-3">
                        <h6 class="fw-bold mb-2"><i class="fa-solid fa-circle-plus me-2 text-muted"></i>Tùy chọn thêm (Topping):</h6>
                        <div id="popupOptionContainer">
                        </div>
                    </div>

                    <div class="d-flex align-items-center justify-content-between pt-3 border-top">
                        <h6 class="fw-bold mb-0">Số lượng:</h6>
                        <div class="input-group" style="width: 130px;">
                            <button class="btn btn-outline-secondary" type="button" id="btnMinus">-</button>
                            <input type="number" class="form-control text-center" value="1" min="1" id="popupQuantity" readonly>
                            <button class="btn btn-outline-secondary" type="button" id="btnPlus">+</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-warning fw-bold text-white px-4" id="btnConfirmAddToCart" style="background-color: #e25822;">
                        <i class="fa-solid fa-cart-plus me-2"></i>Thêm vào giỏ
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
