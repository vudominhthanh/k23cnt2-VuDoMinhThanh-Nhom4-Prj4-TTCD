<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home - Tea & Coffee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/_layout.css}">

</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar fixed-top">
        <div class="container-70 d-flex align-items-center justify-content-between">
            <a class="navbar-brand" th:href="@{/}">
                ☕ <span>Tea & Coffee</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Trang Chủ</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/menu}">Thực Đơn</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/about}">Về Chúng Tôi</a></li>

                    <li class="nav-item" id="nav-orders" style="display: none; position: relative;">
                        <a class="nav-link" th:href="@{/customer/orders}" title="Đơn hàng của tôi" onclick="hideOrderBadge()">
                            <i class="fa-solid fa-receipt fs-5"></i>
                            <span class="position-absolute top-25 start-75 translate-middle p-1 bg-danger border border-light rounded-circle notification-badge" id="order-badge" style="display: none;">
                                <span class="visually-hidden">Có thông báo mới</span>
                            </span>
                        </a>
                    </li>

                    <li class="nav-item" id="nav-cart" style="display: none; position: relative;">
                        <a class="nav-link" th:href="@{/customer/cart}" title="Giỏ hàng">
                            <i class="fa-solid fa-basket-shopping fs-5"></i>
                            <span class="position-absolute top-25 start-75 translate-middle badge rounded-pill bg-danger" id="cart-count" style="font-size: 0.6rem; display: none;">
                                0
                            </span>
                        </a>
                    </li>

                    <li class="nav-item" id="nav-isnot">
                        <a class="nav-link btn-login" th:href="@{/auth}">Đăng Nhập</a>
                    </li>

                    <li class="nav-item dropdown" id="nav-is">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <span>User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/customer/dashboard}">Hồ Sơ</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="javascript:void(0)" onclick="handleLogout()">Đăng Xuất</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container-70 animate-fade-up" id="function-div">
            <div layout:fragment="content"></div>
        </div>
    </main>

    <footer class="custom-footer">
        <div class="container-70 text-center">
            <p>&copy; 2026 Tea & Coffee Shop</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/_layout.js}"></script>
</body>
</html>
