<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{User/_cuslayout}">
<head>
    <title>Hồ Sơ Của Tôi</title>
</head>
<body>

<th:block layout:fragment="cus-css">
    <link rel="stylesheet" th:href="@{/css/customer_profile.css}">
</th:block>

<div layout:fragment="cus-content">
    <h4 class="mb-4 fw-bold" style="color: var(--coffee-dark)">Chi Tiết Hồ Sơ</h4>

    <div class="profile-form-container">
        <form id="profileForm">
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label text-muted small text-uppercase fw-bold">Họ và Tên</label>
                    <input type="text" class="form-control custom-input" value="Vũ Đỗ Minh Thành">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small text-uppercase fw-bold">Số Điện Thoại</label>
                    <input type="text" class="form-control custom-input bg-light" value="0123456789" readonly>
                    <small class="text-muted">Số điện thoại không thể thay đổi.</small>
                </div>
                <div class="col-md-12">
                    <label class="form-label text-muted small text-uppercase fw-bold">Email</label>
                    <input type="email" class="form-control custom-input" value="thanh@example.com">
                </div>
            </div>

            <div class="d-flex gap-3">
                <button type="button" class="btn btn-save px-4 py-2">Lưu Thay Đổi</button>
                <button type="button" class="btn btn-outline-dark px-4 py-2" data-bs-toggle="modal" data-bs-target="#passwordModal">
                    <i class="fas fa-lock me-2"></i> Đổi Mật Khẩu
                </button>
            </div>
        </form>
    </div>

    <div class="modal fade" id="passwordModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-modal">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" style="color: var(--coffee-dark);">Thay Đổi Mật Khẩu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-4">

                    <div id="pwd-step-1">
                        <p class="text-muted small mb-3">Vì lý do bảo mật, vui lòng xác nhận mật khẩu hiện tại của bạn.</p>
                        <div class="mb-3 position-relative">
                            <input type="password" class="form-control custom-input" id="oldPassword" placeholder="Nhập mật khẩu hiện tại...">
                            <div class="invalid-feedback" id="oldPwdError">Mật khẩu không chính xác!</div>
                        </div>
                        <button type="button" class="btn btn-save w-100" id="btnVerifyOldPwd">Tiếp Tục</button>
                    </div>

                    <div id="pwd-step-2" class="d-none">
                        <div class="mb-3">
                            <label class="form-label small text-muted">Mật khẩu mới</label>
                            <input type="password" class="form-control custom-input" id="newPassword">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-muted">Nhập lại mật khẩu mới</label>
                            <input type="password" class="form-control custom-input" id="confirmPassword">
                            <div class="invalid-feedback" id="newPwdError">Mật khẩu xác nhận không khớp!</div>
                        </div>
                        <button type="button" class="btn btn-save w-100" id="btnSubmitNewPwd">Cập Nhật Mật Khẩu</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="cus-scripts">
    <script th:src="@{/js/customer_profile.js}"></script>
</th:block>

</body>
</html>
